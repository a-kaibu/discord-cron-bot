name: discord-cron

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      message_keys:
        description: "Send specific message key(s), comma-separated. Example: bd1,bd2"
        required: false
        type: string

jobs:
  send-discord-message:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: Asia/Tokyo
      CONFIG_FILE: config.json
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      ACTIONS_VARS_JSON: ${{ toJson(vars) }}
      ACTIONS_SECRETS_JSON: ${{ toJson(secrets) }}
      MANUAL_MESSAGE_KEYS: ${{ inputs.message_keys }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Run bot
        run: go run .
